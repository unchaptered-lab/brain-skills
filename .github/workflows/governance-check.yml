name: Governance Check

on:
  pull_request:
    branches:
      - main

jobs:
  governance:
    runs-on: unchaptered-lab-runner
    env:
      REPOSITORY_PATH: "brain-skills"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: ${{ env.REPOSITORY_PATH }}

      - name: Checkout brain
        uses: actions/checkout@v4
        with:
          repository: unchaptered-lab/brain
          path: brain
          fetch-depth: 1

      - name: Check governance
        env:
          UNCHAPTERED_LAB_ROOT: ${{ github.workspace }}
        working-directory: ${{ github.workspace }}/${{ env.REPOSITORY_PATH }}
        run: |
          set -euo pipefail
          "$UNCHAPTERED_LAB_ROOT/brain/scripts/governance/check.sh" --current-repo
